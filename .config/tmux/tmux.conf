# Prefix stays on the tmux default: C-b.

##### Terminal and editor behavior #####

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,alacritty*:RGB,ghostty*:RGB,tmux-256color:RGB"

set -g focus-events on
set -sg escape-time 10
set -g repeat-time 600
set -g display-time 1500
set -g set-clipboard on

setw -g mode-keys vi
set -g status-keys vi

##### Windows and panes #####

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g allow-rename off
setw -g automatic-rename on
setw -g monitor-activity on
set -g visual-activity off

set -g mouse on

bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Copy mode #####

bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sh -c 'if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -in; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi'"
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

##### Config management #####

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

##### Status line #####

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 100

set -g status-style "bg=#212121,fg=#b2ccd6"
set -g status-left "#[fg=#212121,bg=#82aaff,bold] #S #[fg=#82aaff,bg=#212121] "
set -g status-right "#{?client_prefix,#[fg=#ffcb6b]prefix #[fg=#4a4a4a]| ,}#[fg=#c3e88d]%H:%M #[fg=#82aaff]%d %b"

setw -g window-status-format " #[fg=#b2ccd6]#I:#W "
setw -g window-status-current-format "#[fg=#212121,bg=#c3e88d,bold] #I:#W #[fg=#c3e88d,bg=#212121]"
setw -g window-status-separator ""

set -g pane-border-style "fg=#353535"
set -g pane-active-border-style "fg=#82aaff"
set -g message-style "bg=#303030,fg=#eeffff"
set -g mode-style "bg=#82aaff,fg=#212121,bold"
set -g clock-mode-colour "#82aaff"
